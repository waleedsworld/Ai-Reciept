<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload a Receipt · Spending Analyzer</title>
  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --border: #2a3441;
      --text: #e6edf3; --muted: #8b98a5; --accent: #4ade80; --accent-2: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(1000px 500px at 85% -10%, #14301f 0%, transparent 55%), var(--bg);
      color: var(--text); line-height: 1.55;
      display: flex; align-items: flex-start; justify-content: center; padding: 40px 18px;
    }
    .card {
      width: 100%; max-width: 560px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 16px; padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    a.back { color: var(--muted); text-decoration: none; font-size: .9rem; }
    a.back:hover { color: var(--accent); }
    h1 { font-size: 1.6rem; margin: 14px 0 6px; letter-spacing: -0.02em; }
    p.sub { color: var(--muted); margin: 0 0 22px; font-size: .95rem; }
    label { display: block; font-size: .85rem; color: var(--muted); margin: 16px 0 7px; font-weight: 600; }
    .drop {
      border: 1.5px dashed var(--border); border-radius: 12px; padding: 26px; text-align: center;
      color: var(--muted); cursor: pointer; transition: border-color .15s ease, background .15s ease;
      background: #12181f;
    }
    .drop:hover, .drop.over { border-color: var(--accent); background: #10201a; color: var(--text); }
    .drop .big { font-size: 30px; }
    .drop small { display: block; margin-top: 6px; font-size: .8rem; }
    input[type=file] { display: none; }
    input[type=text] {
      width: 100%; padding: 11px 13px; border-radius: 10px; border: 1px solid var(--border);
      background: #12181f; color: var(--text); font-size: .95rem; font-family: inherit;
    }
    input[type=text]:focus { outline: none; border-color: var(--accent-2); }
    button {
      margin-top: 22px; width: 100%; padding: 13px; border: none; border-radius: 11px;
      background: linear-gradient(120deg, #16a34a, #22c55e); color: #04120a;
      font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform .12s ease, opacity .2s;
    }
    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: .55; cursor: default; transform: none; }
    .filename { margin-top: 10px; font-size: .85rem; color: var(--accent); word-break: break-all; }
    pre {
      margin-top: 20px; background: #0b0f14; border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; overflow-x: auto; font-size: .82rem; color: #cbd5e1; max-height: 340px;
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
    }
    .hint { margin-top: 14px; font-size: .8rem; color: var(--muted); }
    .hint code { color: var(--accent-2); }
  </style>
</head>
<body>
  <div class="card">
    <a class="back" href="/">← back to overview</a>
    <h1>📸 Upload a receipt</h1>
    <p class="sub">Drop a photo and we'll read the line items, prices and vendor for you.</p>

    <form id="form">
      <label>Receipt image</label>
      <div class="drop" id="drop">
        <div class="big">🧾</div>
        <span id="dropText">Click to choose or drag an image here</span>
        <small>JPG or PNG</small>
        <input type="file" id="file" name="reciept" accept="image/*" required />
      </div>
      <div class="filename" id="filename"></div>

      <label>Instance ID</label>
      <input type="text" id="instance" name="instance_id" placeholder="your-workspace-uuid" />

      <button type="submit" id="submit">Analyze receipt</button>
    </form>

    <div class="hint">
      Tip: create a workspace first with <code>POST /v1/instances</code> and paste its id above.
    </div>

    <pre id="out" hidden></pre>
  </div>

  <script>
    const drop = document.getElementById("drop");
    const file = document.getElementById("file");
    const filename = document.getElementById("filename");
    const out = document.getElementById("out");
    const btn = document.getElementById("submit");

    drop.addEventListener("click", () => file.click());
    file.addEventListener("change", () => {
      filename.textContent = file.files[0] ? "Selected: " + file.files[0].name : "";
    });
    ["dragover","dragenter"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add("over"); }));
    ["dragleave","drop"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove("over"); }));
    drop.addEventListener("drop", ev => {
      if (ev.dataTransfer.files.length) { file.files = ev.dataTransfer.files; file.dispatchEvent(new Event("change")); }
    });

    document.getElementById("form").addEventListener("submit", async ev => {
      ev.preventDefault();
      if (!file.files[0]) return;
      btn.disabled = true; btn.textContent = "Reading receipt…";
      out.hidden = false; out.textContent = "⏳ Sending image to the parser…";
      const fd = new FormData();
      fd.append("reciept", file.files[0]);
      fd.append("instance_id", document.getElementById("instance").value || "demo");
      try {
        const r = await fetch("/upload", { method: "POST", body: fd });
        const data = await r.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        out.textContent = "Request failed: " + err + "\n\n(Set OPENAI_API_KEY in your .env to enable parsing.)";
      } finally {
        btn.disabled = false; btn.textContent = "Analyze receipt";
      }
    });
  </script>
</body>
</html>
